<!DOCTYPE html>
<html ng-app="weatherApp">
	<head>
		<meta charset="UTF-8">
		<title>Weather App</title>
		<!-- Bootstrap 3.4.1 -->
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css"
		      integrity="sha384-HSMxcRTRxnN+Bdg0JdbxYKrThecOKuH5zCYotlSAcp1+c8xmyTe9GYg1l9a69psu" crossorigin="anonymous">
		<!-- jQuery UI 1.14.1 -->
		<link rel="stylesheet" href="https://code.jquery.com/ui/1.14.1/themes/base/jquery-ui.min.css"
		      integrity="sha384-zR/jkclV8JzpZv6ONtyAg2c/SJQRL8k3ZYyDf2O9XGHO16FV9l6/kEdN4IGkspLj" crossorigin="anonymous">
		<link rel="stylesheet" href="/weather/style/weather.css">
		<!-- jQuery 3.7.1 -->
		<script src="https://code.jquery.com/jquery-3.7.1.min.js"
		        integrity="sha384-1H217gwSVyLSIfaLxHbE7dRb3v4mYCKbpQvzx0cegeju1MVsGrX5xXxAvs/HgeFs" crossorigin="anonymous"></script>
		<!-- jQuery UI 1.14.1 -->
		<script src="https://code.jquery.com/ui/1.14.1/jquery-ui.min.js"
		        integrity="sha384-SStJQoPipVtHHnIgUfDI+jTAbSyU+HMbhwt2XRRNpLIRFg9VguopT6Y4+cdOlkqg" crossorigin="anonymous"></script>
		<!-- AngularJS 1.8.3 -->
		<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"
		        integrity="sha384-quGekMf1ic6tIOn1GgLl0Pzra4ZkFyTcaDW3hZRjORqPQe3HnTKGl+lNPpuh7Lwv" crossorigin="anonymous"></script>
		<!-- App -->
		<script src="/weather/javascript/weather-angular.js"></script>
		<script src="/weather/javascript/weather-controller.js"></script>
		<script src="/weather/javascript/forecast-controller.js"></script>
		<script src="/weather/javascript/forecast-directive.js"></script>
		<script src="/weather/javascript/city-autocomplete-directive.js"></script>
		<script src="/weather/javascript/load.js"></script>
	</head>
	<body ng-controller="WeatherController as weatherCtrl">
		<div style="width: 400px">
			<form novalidate name="forecastForm" ng-controller="ForecastController as forecastCtrl"
					ng-submit="forecastCtrl.getForecast(weatherCtrl.cityForecast)">
				<label for="city"><h2>City</h2></label>
				<fieldset class="form-group">
					<input ng-model="forecastCtrl.city" class="form-control" placeholder="enter a City" title="City" required auto-complete/>
				</fieldset>
				<fieldset class="form-group">
					<input type="submit" class="btn btn-primary pull-right" ng-disabled="forecastForm.$invalid" value="Send" />
				</fieldset>
			</form>
		</div>
		<div ng-show="weatherCtrl.cityForecast.error" style="color:red">
			{{weatherCtrl.cityForecast.error}}
		</div>
		<forecast-grid></forecast-grid>
	</body>
</html>
